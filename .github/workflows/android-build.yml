name: Build Android APK

on:
  push:
    branches: [ "main" ] # هر بار که کد جدید روی این شاخه پوش شود، بیلد انجام می‌شود

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # نسخه نود جی‌اس خود را تنظیم کنید

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17' # کپسیتور معمولا به جاوا ۱۷ نیاز دارد

    - name: Install Dependencies
      run: npm install

    - name: Build Next.js
      run: npm run build

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk