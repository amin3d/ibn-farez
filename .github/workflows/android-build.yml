name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # رفع اخطار Node.js

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Install Dependencies
      run: npm install

    - name: Build Next.js
      run: npm run build

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/ibn-alfard-release.keystore

    - name: Verify Keystore
      run: |
        file android/app/ibn-alfard-release.keystore
        keytool -list -v -keystore android/app/ibn-alfard-release.keystore -storepass ${{ secrets.KEYSTORE_PASSWORD }} | head -n 10

    - name: Build Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease
      env:
        STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Check APK exists
      run: |
        ls -la android/app/build/outputs/apk/release/ || echo "Directory not found"
        find android -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        if-no-files-found: error

    - name: Upload APK to Release
      uses: softprops/action-gh-release@v1
      with:
        files: android/app/build/outputs/apk/release/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}